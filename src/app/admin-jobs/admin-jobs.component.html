  <div class="container mb-3 mt-5 px-5">
    <div class="box-border rounded">
      <div
        class="d-flex align-items-center justify-content-between px-2 py-2 bottom-border"
      >
        <p class="mt-2 custom-font text-black">Jobs</p>

        <!-- Success message -->
        <div *ngIf="successMessage" class="alert alert-success py-2 px-3 mt-2">
          {{ successMessage }}
        </div>

        <!-- Error message -->
        <div *ngIf="errorMessage" class="alert alert-danger py-2 px-3 mt-2">
          {{ errorMessage }}
        </div>

        <!-- Search box -->
        <div class="d-flex align-items-center dashboard-searchBox px-2 rounded">
          <i class="bi bi-search fs-5"></i>
          <input
            type="search"
            class="border-0 ms-2 dashboard-input bg-transparent ps-2 py-2"
            placeholder="Search here..."
            [(ngModel)]="searchText"
          />
          <img
            src="../../assets/images/Search Key.png"
            class="ms-5 img-fluid"
            alt=""
          />
        </div>
      </div>

      <!-- job Table -->
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead class="border-bottom">
            <tr>
              <th class="head-row text-start" style="width: 30%">Name</th>
              <th class="head-row text-center" style="width: 15%">Category</th>
              <!-- <th class="head-row text-center" style="width: 15%;">City</th> -->
              <!-- <th class="head-row text-start ps-5" style="width: 20%">
                Status
              </th> -->
              <th class="head-row text-center" style="width: 20%">Details</th>
              <th class="head-row text-center" style="width: 15%">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr
              *ngFor="
                let job of jobApplications | search : searchText : 'companyName'
              "
              class="stripped-background"
            >
              <!-- Company Name + Email -->
              <td class="text-start">
                <h5 class="fw-bold custom-font mb-0">{{ job.jobTitle }}</h5>
                <small class="negative-margin"
                  >{{ job.companyName }} | {{ job.jobTypeTitle }}</small
                >
              </td>

              <!-- Country -->
              <td class="text-center">{{ job.jobCategoryTitle }}</td>

              <!-- City -->
              <!-- <td class="text-center">{{ job.cityName }}</td> -->

              <!-- Toggle Status -->
              <!-- <td class="text-center">
                <div class="d-flex justify-content-center align-items-center">
                  <label class="switch">
                    <input
                      type="checkbox"
                      [(ngModel)]="job.toggleStatus"
                      (change)="onToggleStatus(job)"
                    />
                    <span class="slider"></span>
                  </label>
                  <span class="ms-2">
                    {{ job.toggleStatus ? "Expired" : "Publish" }}
                  </span>
                </div>
              </td> -->

              <!-- Details Button -->
              <td class="text-center">
                <button
                  class="px-2 py-2 application-custom-btn text-white border-0 rounded"
                  (click)="onViewApplications(job)"
                >
                  Details
                </button>
              </td>
              <td class="text-center">
                <div
                  class="d-flex justify-content-center align-items-center gap-3"
                >
                  <i class="bi bi-trash fs-5 text-danger" role="button" (click)="openDeleteModal(job)"></i>
                  <!-- <i
                    class="bi bi-pencil-square fs-5 text-primary"
                    role="button"
                  ></i> -->
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
<!-- </div> -->




<!-- modal window -->
<div
  class="modal fade"
  id="deleteModal"
  tabindex="-1"
  aria-labelledby="deleteModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="deleteModalLabel">Confirm Delete</h6>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        Are you sure you want to delete
        <strong>{{ jobToDelete?.jobTitle }}</strong>?
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary btn-sm"
          data-bs-dismiss="modal"
        >
          Cancel
        </button>
        <button
          type="button"
          class="btn btn-danger btn-sm"
          (click)="confirmDelete()"
        >
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
