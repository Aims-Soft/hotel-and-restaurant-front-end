<div class="container" style="margin-top: 5em; font-family: poppins">
  <div class="container">
    <div class="row ms-5">
      <div class="col-md-4">
        <button class="btn px-3 py-2 text-white mt-3 go-back" (click)="goBack()">Go Back</button>
      </div>
      <div class="col-md-4 text-center">
        <h1 class="fw-bold apply-job">Apply For Job</h1>
        <p class="detailApply-jobText">Enter Detail to Apply for Job</p>
      </div>
    </div>
    <div class="row mt-4 mx-5">
<div class="col-md-6">
  <p>Profile Image</p>
  <div class="mt-3 text-center py-1 d-block pic-border">
    <div *ngIf="userData?.eDoc; else noProfile">
      <img
        [src]="userData?.eDoc"
        alt="Profile Image"
        class="img-fluid"
        style="max-height: 150px; object-fit: contain;"
      />
    </div>
    <ng-template #noProfile>
      <p class="mt-3 pic-border-inner text-muted">No Profile Image</p>
    </ng-template>
  </div>
</div>

<div class="col-md-6">
  <p>Upload Resume</p>
  <div class="mt-3 text-center py-1 d-block pic-border">
    <div *ngIf="userData?.eResume; else noResume">
      <a [href]="userData?.eResume" target="_blank" class="btn btn-outline-primary">
        View Resume
      </a>
    </div>
    <ng-template #noResume>
      <p class="mt-3 pic-border-inner text-muted">No Resume Uploaded</p>
       <small class="text-danger" *ngIf="isFormSubmitted && !userData?.eResume">
              Resume is required to apply
            </small>
    </ng-template>

  </div>
</div>

    </div>
    <!-- FORM -->
    <form action="" class="mx-5 my-4">
      <div class="row">
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="name">User Name</label>
            <!-- <input type="text" class="rounded px-2 py-2 mt-2 input-border" placeholder="NAME" name="" id="name"
            [(ngModel)]="userData.userName" name="userName"  /> -->
            <input type="text" class="rounded px-2 py-2 mt-2 input-border"
       [(ngModel)]="userData.userName" name="userName"  disabled/>

          </div>
        </div>
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="Profession">Profession</label>
            <input type="text" class="rounded px-2 py-2 mt-2 input-border"
             [(ngModel)]="userData.profession" name="profession" disabled />
          </div>
        </div>
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="name">Study Level</label>
             <!-- <input class="rounded px-2 py-2 mt-2 input-border text-secondary"
              [(ngModel)]="userData.studyLevelTitle" name="studyLevelTitle" disabled> -->
                   <select class="form-select rounded px-2 py-2 mt-2 input-border text-secondary" (change)="onStudyChange($event)" required>
              <option selected disabled>Select Study Level</option>
              <option
                *ngFor="let item of DegreeLevel"
                [value]="item.studyLevelID"
              >
                {{ item.studyLevelTitle }}
              </option>
            </select>
              <small class="text-danger mt-1" *ngIf="isFormSubmitted && !selectedDegree">
              <i class="bi bi-exclamation-circle me-1"></i>Please select your study level
            </small>
           
          </div>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="Experience">Experience</label>
              <!-- <input class="rounded px-2 py-2 mt-2 input-border text-secondary"
              [(ngModel)]="userData.experienceRange" name="experienceRange" disabled> -->
                 <select class="form-select rounded px-2 py-2 mt-2 input-border text-secondary" (change)="onExperienceChange($event)"   required>
              <option selected disabled>Select Experience</option>
              <option
                *ngFor="let item of experience"
                [value]="item.experienceID"
              >
                {{ item.experienceRange }}
              </option>
            </select>

    <small class="text-danger mt-1" *ngIf="isFormSubmitted && !selectedExperience">
              <i class="bi bi-exclamation-circle me-1"></i>Please select your experience level
            </small>
          </div>
        </div>
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="Country">Country</label>
           <input class="rounded px-2 py-2 mt-2 input-border text-secondary"
              [(ngModel)]="userData.countryName" name="countryName" disabled>
          </div>
        </div>
       <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="City">City</label>
              <input class="rounded px-2 py-2 mt-2 input-border text-secondary"
              [(ngModel)]="userData.cityName" name="cityName" disabled>
          </div>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="nbr">Contact No</label>
            <input type="text" class="rounded px-2 py-2 mt-2 input-border"
       [(ngModel)]="userData.contactNo" name="contactNo"  disabled/>
          </div>
        </div>
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="mail">Email</label>
            <input type="email" class="rounded px-2 py-2 mt-2 input-border"
             [(ngModel)]="userData.email" name="email" disabled />
          </div>
        </div>
        <div class="col-md-4">
          <div class="d-flex flex-column">
            <label for="Address">Address</label>
          <input type="email" class="rounded px-2 py-2 mt-2 input-border"
             [(ngModel)]="userData.address" name="address" disabled />
          </div>
        </div>
      </div>
    </form>
    <!-- Bottom Button -->
    <div class="text-end mx-5 mb-4">
      <button class="btn me-3 cancel-btn-border">Cancel</button>
      <!-- <button class="btn text-white px-3 apply-btn-style" (click)="onRegister()">Apply</button> -->
        <button 
        class="btn text-white px-3 apply-btn-style" 
        (click)="onRegister()"
        [disabled]="isLoading"
      >
        <span *ngIf="!isLoading">
          <i class="bi bi-send me-2"></i>Apply
        </span>
        <span *ngIf="isLoading">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          Applying...
        </span>
      </button>
    </div>
        <!-- Success/Error Message Alert -->
    <div *ngIf="showMessage" class="alert alert-dismissible fade show mx-5" 
         [ngClass]="{'alert-success': successMessage, 'alert-danger': errorMessage}" 
         role="alert">
      <div class="d-flex align-items-center">
        <i class="bi me-2" 
           [ngClass]="{'bi-check-circle-fill': successMessage, 'bi-exclamation-triangle-fill': errorMessage}">
        </i>
        <span>{{ successMessage || errorMessage }}</span>
      </div>
      <button type="button" class="btn-close" (click)="clearMessages()"></button>
    </div>
  </div>
</div>
<app-footer></app-footer>
