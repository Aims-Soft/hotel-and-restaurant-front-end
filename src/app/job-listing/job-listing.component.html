<div class="text-center mt-3 font" style="overflow: hidden;">
  <div class="py-4 listing-bg">
    <h1 class="fw-bold job-listing-title">Job Listing</h1>
    <p class="job-listing-para">
      Emphasizes the value proposition for both job seekers and employers and
      the ultimate goal
    </p>
  </div>
  <!-- search box -->
  <div class="row">
    <div class="col-md-4"></div>
    <div class="col-md-4 mt-5 ps-3 py-2 d-flex align-items-center searchbox  border border-0 ">
      <i class="bi bi-search ms-2"></i>
      <input
        type="search"
        placeholder="Search Job here.."
        class="bg-transparent border-0 ms-3 me-4"
          [(ngModel)]="searchQuery"
        (keyup.enter)="findJobs()"
     

   
      />
      <button
        class="border-0 px-3 py-2 ms-5 fw-bold search-box-btn"
    
      >
        Find Your Job
      </button>
    </div>
  </div>

  <div class="mt-4 mb-5">
    <span class="d-inline-block popular-catagories">&#x7C;</span>
    <span class="ms-2" style="color: #0f1d1f; font-size: 1.1em"
      >Popular Categories: &nbsp; Product Designer, Developer, Designer</span
    >
  </div>
  
</div>

<div class="container">


    <button
  class="btn text-white p-2 m-2 ms-4"
  style="background-color: #1A0052;"
  routerLink="/"
>
  Home
</button>

<app-job-display [searchQuery]="searchQuery"></app-job-display>
</div>
