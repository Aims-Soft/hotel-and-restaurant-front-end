<div
  style="background-color: #f3f2ff; font-family: reddit-sans"
  class="py-3 text-center"
>
  <h1 class="fw-bold" style="font-size: 76px; color: #0d0125">Companies</h1>
  <p style="font-size: 1.1em; color: #0f1d1f">
    Emphasizes the value proposition for both job seekers <br />
    and employers and the ultimate goal
  </p>
</div>
<div class="container">
 <div class="row row-cols-1 row-cols-md-4 g-4 mt-3">
    <a
      href=""
      [routerLink]="['/companyDetails', item.companyID]"
      class="col-md-3 px-4 text-decoration-none company-title-font-color"
         *ngFor="let item of visibleCompanies"
    >
      <div class="text-center py-3 company-box ">
        <img
          [src]="item.companyLogo || 'assets/images/company-monogram.svg'" 
          (error)="onImageError($event)"
          alt="{{ item.companyName }}"
          class="company-logo "
        />
        <h5 class="mt-3 fw-bold company-title-font-size">
          {{ item.companyName }}
        </h5>
        <div class="d-flex align-items-center justify-content-center">
          <p class="mt-1 me-2">{{item.jobCount}}Jobs</p>
          <span style="font-size: 1.5em">&#8594;</span>
        </div>
      </div>
    </a>
  </div>

  <div class="text-center">
    <button
      class="btn mt-3 mb-4 text-white btns"
      *ngIf="!showAll"
      (click)="loadMore()"
    >
      Load More
    </button>
    <button
      class="btn mt-3 mb-4 text-white btns"
      *ngIf="showAll"
      (click)="showLess()"
    >
      Show Less
    </button>
  </div>

  <!-- <div class="text-center">
        <button class="btn mt-3 mb-4 text-white btns">Load More</button></div>
</div> -->
</div>
<app-footer></app-footer>
