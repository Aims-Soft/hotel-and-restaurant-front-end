<div  class="bgpink" style=" font-family: Playfair Display;background-color: #fffbf2;" class="py-3 text-center">
  <h1 class="fw-bold " style="font-size: 76px; ">Hotels</h1>
  <p style="font-size: 1.1em; ">
    Emphasizes the value proposition for both job seekers <br />
    and employers and the ultimate goal
  </p>
</div>

<div class="container">
  <div class="d-flex align-items-center dashboard-searchBox p-2 rounded mt-2 col-md-4 offset-md-4">
    <i class="bi bi-search fs-5"></i>
    <input
      type="search"
      class="border-0 ms-2 dashboard-input bg-transparent ps-2 py-2"
      placeholder="Search here..."
      [(ngModel)]="searchText"
    />
    <img src="../../assets/images/Search Key.png" class="ms-5 img-fluid" alt="" />
  </div>
  
  <button class="btn text-dark p-2 m-2 bgbrown" routerLink="/">
    Home
  </button>
  
  <!-- Company Cards Grid - 3 Cards per Row -->
  <div class="row g-3 g-md-4 mt-3">
    <div
      class="col-12 col-sm-6 col-lg-4"
      *ngFor="let item of visibleCompanies | search: searchText : 'companyName'"
    >
      <a
        [routerLink]="['/companyDetails', item.companyID]"
        class="text-decoration-none"
      >
        <div class="company-card-new">
          <!-- Company Image -->
          <div class="company-image-wrapper">
            <img
              [src]="item.companyDoc || 'assets/images/company-monogram.svg'"
              (error)="onImageError($event)"
              alt="{{ item.companyName }}"
              class="company-image-new"
            />
            
            <!-- Location Badge -->
            <div class="location-badge">
              <i class="bi bi-geo-alt-fill me-1"></i>
              <span>{{item.cityName}}</span>
            </div>
            
            <!-- Logo Circle -->
            <div class="company-logo-circle">
              <img
                [src]="item.companyLogo || 'assets/images/company-monogram.svg'"
                (error)="onImageError($event)"
                alt="{{ item.companyName }}"
                class="logo-icon"
              />
            </div>
          </div>
          
          <!-- Company Info -->
          <div class="company-info-new">
            <h5 class="company-name-new">{{ item.companyName }}</h5>
            <p class="company-description">
            {{ item.description | slice: 0:80}}{{ item.description.length > 80 ? '...' : '' }}
            </p>
            <a class="view-profile-link">
              View Profile <i class="bi bi-arrow-right ms-1"></i>
            </a>
          </div>
        </div>
      </a>
    </div>
  </div>

  <!-- Load More/Show Less Button -->
  <div class="text-center">
    <button class="btn mt-3 mb-4 text-dark bgbrown" *ngIf="!showAll" (click)="loadMore()">
      Load More
    </button>
    <button class="btn mt-3 mb-4 text-dark bgbrown" *ngIf="showAll" (click)="showLess()">
      Show Less
    </button>
  </div>
</div>

<app-footer></app-footer>
