<div class="dashborad-position">
   <div class="py-3 d-flex align-items-center justify-content-end bottom-border">
        <i class="bi bi-bell fs-4"></i>
        <div class="d-flex align-items-center profile-border px-2 py-1 ms-2">
            <img src="../../assets/images/profilePic.png" class="img-fluid" alt="" />
            <i class="bi bi-chevron-down ms-2 fs-5"></i>
        </div>
    </div>
    
 <div class="container mb-3 mt-5 px-5">
    <div class="box-border rounded">
      <div class="d-flex align-items-center justify-content-between px-2 py-2 bottom-border">
        <p class="mt-2 custom-font text-black">Candidates</p>

        <!-- Success message -->
        <div *ngIf="successMessage" class="alert alert-success py-2 px-3 mt-2">
          {{ successMessage }}
        </div>

        <!-- Error message -->
        <div *ngIf="errorMessage" class="alert alert-danger py-2 px-3 mt-2">
          {{ errorMessage }}
        </div>

        <div class="d-flex align-items-center gap-2">
          <!-- Export to Excel Button -->
          <button 
            class="btn btn-success d-flex align-items-center"
            (click)="exportToExcel()"
            [disabled]="jobApplications.length === 0">
            <i class="bi bi-file-earmark-excel me-2"></i>
            Export to Excel
          </button>

          <!-- Search box -->
          <div class="d-flex align-items-center dashboard-searchBox px-2 rounded">
            <i class="bi bi-search fs-5"></i>
            <input
              type="search"
              class="border-0 ms-2 dashboard-input bg-transparent ps-2 py-2"
              placeholder="Search here..."
              [(ngModel)]="searchText"
            />
            <img
              src="../../assets/images/Search Key.png"
              class="ms-5 img-fluid"
              alt=""
            />
          </div>
        </div>
      </div>

      <!-- Loading Spinner -->
      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <!-- Company job user table -->
      <div class="table-responsive" *ngIf="!isLoading">
        <table class="table align-middle mb-0">
          <thead class="border-bottom">
            <tr>
              <th class="head-row text-start" style="width: 20%;">Name</th>
              <th class="head-row text-center" style="width:20%;">Job</th>
              <th class="head-row text-center" style="width: 15%;">Country</th>
              <th class="head-row text-center" style="width: 15%;">City</th>
              <th class="head-row text-center" style="width: 20%;">Contact</th>
            </tr>
          </thead>
          <tbody>
            <tr
              *ngFor="let item of jobApplications | search : searchText : 'userName'"
              class="stripped-background">
              <!-- Name + Email -->
              <td class="text-start">
                <h5 class="fw-bold custom-font mb-0">{{ item.userName }}</h5>
                <small class="negative-margin">{{ item.email }}</small>
              </td>

              <!-- Job Title -->
              <td class="text-center">
                <h5 class="custom-font mb-0">{{ item.jobTitle }}</h5>
              </td>

              <!-- Country -->
              <td class="text-center">{{ item.countryName }}</td>

              <!-- City -->
              <td class="text-center">{{ item.cityName }}</td>

              <!-- Contact -->
              <td class="text-center">{{ item.contact }}</td>
            </tr>
          </tbody>
        </table>

        <!-- No data message -->
        <div *ngIf="jobApplications.length === 0" class="text-center py-5">
          <p class="text-muted">No candidates found.</p>
        </div>
      </div>
    </div>
  </div>
</div>
