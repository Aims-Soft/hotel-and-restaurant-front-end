<div class="container bg-white px-2 rounded nav-styling">
  <div class="row ms-4 mt-3 py-3 d-md-flex align-items-center">
    <div class="col-md-2">
      <a routerLink="/">
        <img
          src="../../assets/images/pakistanEductionportal.png"
          class="img-fluid"
          alt="logo"
      /></a>
    </div>
    <div class="col-md-4 offset-md-2">
      <a
        href="#"
        class="text-decoration-none custom-link"
        routerLink="/jobListing"
        >Jobs</a
      >
      <a
        href="#"
        class="text-decoration-none ms-5 custom-link"
        routerLink="/companies"
        >Companies</a
      >
      <a
        href="#"
        class="text-decoration-none ms-5 custom-link"
        routerLink="/contact"
        >Contact</a
      >
    </div>

    <div class="col-md-3 offset-md-1 text-end">
      <!-- Show Register & Sign In if NOT logged in -->
      <ng-container *ngIf="!isLoggedIn; else profileSection">
        <button
          class="ms-4 px-3 py-2 rounded bg-transparent fw-bold registar-btn"
          data-bs-toggle="modal"
          data-bs-target="#registerModal"
        >
          Register
        </button>
        <button
          class="ms-3 px-3 py-2 border-0 rounded text-white fw-bold btns"
          routerLink="/signIn"
        >
          Sign In
        </button>
      </ng-container>

      <!-- Profile Section if Logged In -->
      <ng-template #profileSection>
        <div ngbDropdown class="d-inline-block">
          <!-- Profile Image Button -->
          <button
            class="btn p-0 border-0 bg-transparent"
            id="profileDropdown"
            ngbDropdownToggle
          >
            <img
              src="../../assets/images/1.png"
              alt="Profile"
              class="rounded-5"
              width="60"
              height="40"
            />
          </button>

          <!-- Dropdown Menu -->
          <div ngbDropdownMenu aria-labelledby="profileDropdown" class="dropdown-menu-end">
            <!-- Show "My Profile" only for Role ID 1 (Candidate) -->
            <button 
              *ngIf="shouldShowCandidateButton()" 
              class="dropdown-item" 
              (click)="goToCandidateProfile()"
            >
              <i class="bi bi-person-circle me-2"></i>My Profile
            </button>

            <!-- Show "Go to Dashboard" only for Role ID 2 (Company) or 3 (Admin) -->
            <button 
              *ngIf="shouldShowDashboardButton()" 
              class="dropdown-item" 
              (click)="goToDashboard()"
            >
              <i class="bi bi-speedometer2 me-2"></i>Go to Dashboard
            </button>
            
            <!-- Divider only if any button above is shown -->
            <div *ngIf="shouldShowDashboardButton() || shouldShowCandidateButton()" class="dropdown-divider"></div>
            
            <!-- Logout button for all users -->
            <button class="dropdown-item text-danger" (click)="logout()">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div
  class="modal fade"
  id="registerModal"
  tabindex="-1"
  aria-labelledby="registerModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content p-3">
      <div class="modal-header border-0 pb-2">
        <h5
          class="fw-bold custom-modal-title m-0 text-center"
          id="registerModalLabel"
        >
          Register As
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="d-flex gap-2 w-100">
          <button
            type="button"
            class="btn btn-outline flex-fill rounded-3 border border-1"
            routerLink="/registeryourself"
            data-bs-dismiss="modal"
          >
            Candidate
          </button>
          <button
            type="button"
            class="btn btn-outline flex-fill rounded-3 border border-1"
            routerLink="/registercompany"
            data-bs-dismiss="modal"
          >
            Company
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
