<div class="container-fluid bg-white   nav-styling">
  <div class="row ms-md-4  py-2 d-flex align-items-center">
    <!-- Logo -->
    <div class="col-4 col-md-2">
      <a routerLink="/">
        <img
          src="../../assets/images/icons/wesiteLogo.svg"
          class="img-fluid"
          alt="logo"
          style="max-width: 150px;"
      /></a>
    </div>

    <!-- Mobile Menu Toggle Button -->
    <div class="col-6 d-md-none text-end">
      <button 
        class="btn border-0 p-0" 
        type="button"
        (click)="toggleMobileMenu()"
        aria-label="Toggle navigation"
      >
        <i class="bi bi-list fs-1 text-success"></i>
      </button>
    </div>

    <!-- Desktop Navigation Links -->
    <div class="col-md-6  offset-md-1 text-center d-none d-md-block ">
       <a
        href="#"
        class="text-decoration-none custom-link"
        routerLink="/"
        >Home</a
      >
      <a
        href="#"
        class="text-decoration-none custom-link ms-5"
        routerLink="/jobListing"
        >Jobs</a
      >
      <a
        href="#"
        class="text-decoration-none ms-5 custom-link"
        routerLink="/companies"
        >Hotels</a
      >
       <a
        href="#"
        class="text-decoration-none ms-5 custom-link"
        routerLink="/contact"
        >Categories</a
      >
      <a
        href="#"
        class="text-decoration-none ms-5 custom-link"
        routerLink="/contact"
        >Contact us</a
      >
    </div>

    <!-- Desktop Auth Buttons -->
    <div class="col-md-3  text-end d-none d-md-block">
      <!-- Show Register & Sign In if NOT logged in -->
      <ng-container *ngIf="!isLoggedIn; else profileSection">
        <button
          class="ms-4 px-3 py-2 rounded bg-transparent fw-bold registar-btn"
          data-bs-toggle="modal"
          data-bs-target="#registerModal"
        >
          Register
        </button>
        <button
          class="ms-3 px-3 py-2 border-0 rounded text-dark fw-bold btns"
          routerLink="/signIn"
        >
          Sign In
        </button>
      </ng-container>

      <!-- Profile Section if Logged In -->
    <!-- Desktop Profile Section -->
<ng-template #profileSection>
  <div ngbDropdown class="d-inline-block">
    <!-- Profile Image Button with loading state -->
    <button
      class="btn p-0 border-0 bg-transparent"
      id="profileDropdown"
      ngbDropdownToggle
      [disabled]="isLoadingProfile"
    >
      <div *ngIf="isLoadingProfile; else profileImage">
        <div class="spinner-border spinner-border-sm text-success" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      
      <ng-template #profileImage>
        <img
          [src]="profileImageUrl"
          alt="Profile"
          class="rounded-circle"
          width="40"
          height="40"
          style="object-fit: cover; border: 2px solid #4CAF50; cursor: pointer;"
          (error)="handleImageError($event)"
        />
      </ng-template>
    </button>

    <!-- Dropdown Menu -->
    <div ngbDropdownMenu aria-labelledby="profileDropdown" class="dropdown-menu-end">
      <!-- Show user info header -->
      <div class="dropdown-item-text border-bottom pb-2 mb-2">
        <div class=" small">{{ fullName || 'User' }}</div>
        <small class="text-muted">
          {{ roleId === 1 ? 'Candidate' : roleId === 2 ? 'Hotel' : 'Admin' }}
        </small>
      </div>
      
      <!-- Rest of your dropdown items -->
      <button 
        *ngIf="shouldShowCandidateButton()" 
        class="dropdown-item" 
        (click)="goToCandidateProfile()"
      >
        <i class="bi bi-person-circle me-2"></i>My Profile
      </button>

      <button 
        *ngIf="shouldShowDashboardButton()" 
        class="dropdown-item" 
        (click)="goToDashboard()"
      >
        <i class="bi bi-speedometer2 me-2"></i>Go to Dashboard
      </button>
      
      <div *ngIf="shouldShowDashboardButton() || shouldShowCandidateButton()" class="dropdown-divider"></div>
      
      <button class="dropdown-item text-danger" (click)="logout()">
        <i class="bi bi-box-arrow-right me-2"></i>Logout
      </button>
    </div>
  </div>
</ng-template>
    </div>

    <!-- Mobile Menu Sidebar (Full Screen Overlay) -->
    <div 
      class="mobile-menu-overlay" 
      [class.show]="showMobileMenu"
      (click)="closeMobileMenu()"
    ></div>

    <div 
      class="mobile-menu-sidebar" 
      [class.show]="showMobileMenu"
    >
      <!-- Close Button -->
      <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <h5 class="mb-0 fw-bold">Menu</h5>
        <button 
          class="btn border-0 p-0" 
          (click)="closeMobileMenu()"
          aria-label="Close menu"
        >
          <i class="bi bi-x-lg fs-4"></i>
        </button>
      </div>

      <!-- Mobile Navigation Links -->
      <div class="p-3">
        <a
          class="d-block py-3 text-decoration-none custom-link border-bottom"
          routerLink="/jobListing"
          (click)="closeMobileMenu()"
        >
          <i class="bi bi-briefcase me-2"></i>Jobs
        </a>
        <a
          class="d-block py-3 text-decoration-none custom-link border-bottom"
          routerLink="/companies"
          (click)="closeMobileMenu()"
        >
          <i class="bi bi-building me-2"></i>Companies
        </a>
        <a
          class="d-block py-3 text-decoration-none custom-link border-bottom"
          routerLink="/contact"
          (click)="closeMobileMenu()"
        >
          <i class="bi bi-envelope me-2"></i>Contact
        </a>

        <!-- Mobile Auth Section -->
        <div class="mt-4">
          <ng-container *ngIf="!isLoggedIn; else mobileProfileSection">
            <button
              class="btn w-100 mb-2 px-3 py-2 rounded bg-transparent fw-bold registar-btn"
              data-bs-toggle="modal"
              data-bs-target="#registerModal"
              (click)="closeMobileMenu()"
            >
              Register
            </button>
            <button
              class="btn w-100 px-3 py-2 border-0 rounded text-white fw-bold btns"
              routerLink="/signIn"
              (click)="closeMobileMenu()"
            >
              Sign In
            </button>
          </ng-container>

          <!-- Mobile Profile Section -->
          <ng-template #mobileProfileSection>
            <div class="border-top pt-3">
              <button 
                *ngIf="shouldShowCandidateButton()" 
                class="btn w-100 text-start mb-2 py-2" 
                (click)="goToCandidateProfile(); closeMobileMenu()"
              >
                <i class="bi bi-person-circle me-2"></i>My Profile
              </button>

              <button 
                *ngIf="shouldShowDashboardButton()" 
                class="btn w-100 text-start mb-2 py-2" 
                (click)="goToDashboard(); closeMobileMenu()"
              >
                <i class="bi bi-speedometer2 me-2"></i>Go to Dashboard
              </button>
              
              <button 
                class="btn w-100 text-start text-danger py-2" 
                (click)="logout(); closeMobileMenu()"
              >
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </button>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div
  class="modal fade"
  id="registerModal"
  tabindex="-1"
  aria-labelledby="registerModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content p-3">
      <div class="modal-header border-0 pb-2">
        <h5
          class="fw-bold custom-modal-title m-0 text-center"
          id="registerModalLabel"
        >
          Register As
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <div class="d-flex gap-2 w-100">
          <button
            type="button"
            class="btn btn-outline flex-fill rounded-3 border border-1"
            routerLink="/registeryourself"
            data-bs-dismiss="modal"
          >
            Candidate
          </button>
          <button
            type="button"
            class="btn btn-outline flex-fill rounded-3 border border-1"
            routerLink="/registercompany"
            data-bs-dismiss="modal"
          >
           Hotel
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
