<section class="hero-section position-relative min-vh-100 d-flex align-items-center text-white" 
         style="background-image: url('../../../assets/images/icons/heroImage.svg'); background-size: cover; background-position: center; ">
  
  <div class="container text-center px-3 px-md-4">
    <!-- Top Badge -->
    <div class="mb-3 mb-md-4">

    </div>
    
    <!-- Main Heading -->
    <h1 class="display-3 fw-bold mb-3 mb-md-4">
      Connecting Masjids,<br>
      Empowering Communities.
    </h1>
    
    <!-- Subtitle -->
    <p class="lead mx-auto mb-4 mb-md-5 px-2 px-md-0" style="max-width: 800px;">
      A unified digital bridge between Mother Masjids and their neighborhood branches. Manage 
      resources, track attendance, and serve the Ummah with precision
    </p>
    
    <!-- CTA Button -->
    <div class="mb-4 mb-md-5">
      <a href="#" routerLink="registeration" class="btn themecolor btn-lg px-4 px-md-5 py-3 rounded-pill fw-semibold text-white">
        Register Mosque <span class="fw-bold">→</span>
      </a>
    </div>

    <!-- Search bar -->
      <div class="row">
          <div
            class="col-md-10 mt-5 ps-3 py-2 d-flex align-items-center search-box"
          >
            <i class="bi bi-search ms-2"></i>
            <input
              type="search"
              placeholder="Search Job here..."
              class="bg-transparent border-0 ms-3 me-4"
              [(ngModel)]="searchQuery"
              (input)="onSearchInput()"
              (keyup.enter)="findJobs()"
            />
            <button
              class="border-0 px-3 py-2 ms-5 fw-bold search-box-btn"
              (click)="findJobs()"
            >
              Find Your Job
            </button>
          </div>
        </div>
    
<!-- Features Bar -->
<div class="features-bar d-inline-flex gap-3 gap-md-4 herogrey  px-3 px-md-5 py-3 rounded-pill">
  <span class="d-flex align-items-center gap-2">
    <span class="text-warning">●</span> 
    <span class="feature-text">End-to-End Encryption</span>
  </span>
  <span class="d-flex align-items-center gap-2">
    <span class="text-warning">●</span> 
    <span class="feature-text">99.9% Uptime</span>
  </span>
  <span class="d-flex align-items-center gap-2">
    <span class="text-warning">●</span> 
    <span class="feature-text">Free to Use</span>
  </span>
</div>
    
  </div>
</section>
