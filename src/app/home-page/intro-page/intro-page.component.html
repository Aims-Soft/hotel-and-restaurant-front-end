<div class="container-fluid hero">
  <div class="container text-white absolute" style="padding-top: 10.5em">
    <div class="row">
      <div class="col-md-6 me-3">
        <span class="px-3 py-1 searching-site">#1 Job Searching Site</span>
        <h1
          class="mt-3 fw-bold"
          style="font-size: 70px; font-family: reddit-sans"
        >
          Over <span class="span-style"> 500+</span> Jobs <br />
          Waiting For You
        </h1>
        <p class="mt-4 px-2" style="font-size: 1.1em">
          The job market is constantly evolving, presenting both challenges and
          opportunities whether you're a recent graduate.
        </p>

        <div class="row">
          <div
            class="col-md-10 mt-5 ps-3 py-2 d-flex align-items-center search-box"
          >
            <i class="bi bi-search ms-2"></i>
            <input
              type="search"
              placeholder="Job Title & Keyword..."
              class="bg-transparent border-0 ms-3 me-4"
              [(ngModel)]="searchQuery"
              (input)="onSearchInput()"
              (keyup.enter)="findJobs()"
            />
            <button
              class="border-0 px-3 py-2 ms-5 fw-bold search-box-btn"
              (click)="findJobs()"
            >
              Find Your Job
            </button>
          </div>
        </div>

        <div class="mt-4 left-border">
          <p class="ms-2">
            Popular Categories: Product Designer, Developer, Designer
          </p>
        </div>
      </div>
      <div class="col-md-5 ms-5 px-2 py-2 hero-sec-img position-relative">
        <!-- Main Image -->
        <img
          src="../../../assets/images/employe.svg"
          alt="employ img"
          class="img-fluid h-100 rounded"
        />

        <!-- Small Card  -->
        <div
          class="small-card shadow rounded bg-white p-2 d-flex align-items-center"
        >
          <!-- <i class="fas fa-briefcase text-primary me-2"></i> -->
          <img
            src="../../../assets/images/breficase.png"
            alt="breficase img"
            class="img-fluid h-25 rounded"
          />
          <div>
            <h6 class="mb-0 fw-bold text-muted ms-1">234+</h6>
            <small class="text-muted ms-1">Daily Job Post</small>
          </div>
        </div>
      </div>

      <!-- <div

          class="img-fluid h-100"
        />
      </div> -->
    </div>
  </div>
</div>
