<section class="hero-section position-relative min-vh-100 d-flex align-items-center text-white" 
         style="background-image: url('../../../assets/images/icons/heroImage.svg'); background-size: cover; background-position: center;">
  
  <!-- Overlay for better text readability -->
  <div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0, 0, 0, 0.5);"></div>
  
  <div class="container text-center px-3 px-md-4 position-relative" style="z-index: 2;">
    
    <!-- Top Badge -->
    <div class="mb-4">
      <span class="badge rounded-pill px-4 py-2" style="background-color: #B98D46; color: #1a1a1a; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px;font-family: inter;">
        PAKISTAN'S # 1 HOTEL INDUSTRY JOB PORTAL
      </span>
    </div>
    
    <!-- Main Heading -->
    <h1 class="display-3 fw-bold mb-3" style="font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.2;">
      Build Your Career in<br>
      <span style="color: #B98D46;">Hospitality</span>
    </h1>
    
    <!-- Subtitle -->
    <p class="lead mx-auto mb-5 px-2" style="max-width: 800px; font-size: clamp(1rem, 2vw, 1.25rem); color: rgba(255, 255, 255, 0.9);">
      Connect with Pakistan's top hotels. Find your dream job or hire <br> exceptional talent in the hospitality industry.
    </p>
    
    <!-- Search Bar -->
    <div class="mx-auto mb-4" style="max-width: 500px;">
     <div class="d-flex align-items-center bg-transparent rounded-pill p-2 shadow-lg border border-2 border-white">
        <div class="d-flex align-items-center flex-grow-1 px-3">
          <i class="bi bi-search  fs-5 text-white"></i>
          <input type="search" 
                 placeholder="Job Title & Keyword..." 
                 class="form-control border-0 shadow-none ms-3 bg-transparent text-white"
                 [(ngModel)]="searchQuery"
                 (input)="onSearchInput()"
                 (keyup.enter)="findJobs()"
                 style="color: #1a1a1a; font-size: 1rem;">
        </div>
        <button class="btn rounded-pill px-4 py-2 fw-semibold" 
                (click)="findJobs()"
                style="background-color: #B98D46; color: #000000; border: none; white-space: nowrap;">
          Find Your Job
        </button>
      </div>
    </div>
    
    <!-- Popular Categories -->
    <div class="text-white-50 small">
      <span class="me-2" style="color: rgba(255, 255, 255, 0.7);">Popular Categories:</span>
      <span class="text-white">Product Designer, Developer, Designer</span>
    </div>
    
  </div>
</section>
