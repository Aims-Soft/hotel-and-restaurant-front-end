 <div class="row mx-4 mt-3 px-3 py-2 rounded box-shadow" *ngFor="let job of displayedJobs">
  <div class="col-md-5 mt-2">
    <h2 class="ms-2 fw-bold title">{{job.jobTitle}}</h2>
    <div class="d-flex">
      <p class="px-3 py-2 experience">{{job.experienceRange}} Years Experience</p>
      <p class="ms-3 px-3 py-2 experience">{{job.jobTypeTitle}}</p>
      <p class="ms-3 px-3 py-2 experience">{{job.jobSpaceTitle}}</p>
    </div>
    <div class="d-flex align-items-center">
      <img [src]="job.eLogo" class="company-logo" alt="logo" >
      <h2 class="ms-3 companyName">{{job.companyName}}</h2>
    </div>
  </div>
  <div class="col-md-4 offset-md-3 ps-5">
    <p class="ps-5 ms-4 duration">
      <i class="bi bi-alarm"></i>
      <small class="ms-2" style="font-size: 1em;">{{job.displayTime}}</small>
    </p>
    <p class="fw-bold stipend">Pkr{{job.salaryRange}}/Monthly</p>
    <p class="ps-5 city">{{job.cityName}}</p>
    <div class="ms-4">
      <button class="px-3 py-2 ms-5 rounded border-0 applyBtn text-white" (click)="goToApply(job.jobID)">
        View Detail
      </button>
    </div>
  </div>
</div>


<div *ngIf="displayedJobs.length === 0 && !isLoading" class="text-center my-5">
  <p class="text-muted">No jobs found matching your criteria.</p>
</div>

<div class="text-center my-3" *ngIf="jobs.length > 3">
  <p class="text-muted mb-2">
    Showing {{displayedJobs.length}} of {{jobs.length}} jobs
  </p>
  <button class="text-white px-3 py-2 rounded border-0 more-jobs" (click)="toggleJobs()">
    {{ showAll ? 'Show Less Jobs ←' : 'Browse More Jobs →' }}
  </button>
</div>
