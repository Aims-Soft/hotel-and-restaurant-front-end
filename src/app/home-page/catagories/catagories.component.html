<div class="container-fluid py-5">

  <!-- Section Header -->
  <div class="text-center mb-5">
    <h2 class="section-title mb-3"
        style="font-family: 'Playfair Display', serif; font-size: 2.5rem;
               font-weight: 400; color: #2d3748;">
      Browse by <span style="color: #C19A6B;">Categories</span>
    </h2>
    <p class="text-muted"
       style="font-family: 'Inter', sans-serif; font-size: 1rem;">
      Explore opportunities across every hotel domain
    </p>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoadingCategories" class="text-center py-5">
    <div class="spinner-border text-warning" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="text-muted mt-3">Loading categories...</p>
  </div>

  <!-- Category Cards Grid -->
  <div *ngIf="!isLoadingCategories" class="row g-3 mx-auto" style="max-width: 1400px;">

    <div class="col-12 col-sm-6 col-md-3"
         *ngFor="let item of displayedCategories">

      <!-- ✅ Pass full item object (has jobCategoryID) -->
      <div class="category-card rounded-4 p-4 d-flex align-items-center gap-3 h-100"
           [class.selected]="selectedCategory === item.jobCategoryTitle"
           (click)="goToCategory(item)"
           style="background-color: white; cursor: pointer;
                  transition: all 0.3s ease; border: 2px solid transparent;">

        <!-- Icon -->
        <div class="category-icon rounded-3 d-flex align-items-center
                    justify-content-center flex-shrink-0"
             style="width: 56px; height: 56px; background-color: #C19A6B;">
          <i [class]="getCategoryIcon(item.jobCategoryTitle)"
             style="font-size: 1.5rem; color: #1a1a1a;"></i>
        </div>

        <!-- Content -->
        <div>
          <h6 class="mb-1 fw-bold"
              style="color: #1a1a1a; font-family: 'Inter', sans-serif; font-size: 1rem;">
            {{ item.jobCategoryTitle }}
          </h6>
          <p class="mb-0 text-muted"
             style="font-size: 0.875rem; font-family: 'Inter', sans-serif;">
            {{ item.jobCount }} open {{ item.jobCount === 1 ? 'job' : 'jobs' }}
          </p>
        </div>
      </div>
    </div>

  </div>

  <!-- View All / Show Less Button -->
  <div *ngIf="!isLoadingCategories && categories.length > 8"
       class="text-center mt-4">
    <button class="btn btn-outline-warning rounded-pill px-4 py-2 fw-semibold"
            (click)="toggleShowAll()">
      {{ showAll ? 'Show Less' : 'View All (' + categories.length + ' Categories)' }}
    </button>
  </div>

</div>
