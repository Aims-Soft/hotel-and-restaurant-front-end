<div class="registration-container">
  <div class="registration-header">
    <h2>Register yourself</h2>
    <p>Enter Details to Apply for Job</p>
  </div>

  <div class="registration-body">
    <form>
      <!-- Logo Upload Section -->
      <div class="row mb-4">
        <div class="col-md-6 mb-3">
          <label class="form-label">Profile Image</label>

          <div class="upload-area" (click)="fileInput.click()">
            <!-- Show preview if file is selected -->
            <ng-container *ngIf="previewUrl; else uploadPlaceholder">
              <img
                *ngIf="isImage; else pdfBlock"
                [src]="previewUrl"
                alt="Preview"
              />
              <ng-template #pdfBlock>
                <div class="pdf-preview">
                  <i class="fas fa-file-pdf"></i> {{ selectedFile?.name }}
                </div>
              </ng-template>
            </ng-container>

            <!-- Placeholder when nothing is selected -->
            <ng-template #uploadPlaceholder>
              <div class="upload-icon">
                <i class="fas fa-cloud-upload-alt"></i>
              </div>
              <p>Drag & drop or click to upload</p>
              <p class="formats-note">Supported Formats: Pdf, Png, Jpg</p>
            </ng-template>
          </div>

          <!-- Hidden file input -->
          <input
            type="file"
            #fileInput
            style="display: none"
            accept=".pdf,.png,.jpg,.jpeg"
            (change)="onFileSelected($event)"
          />
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Upload Resume</label>
          <div class="upload-area" (click)="bannerInput.click()">
            <!-- Show preview if file is selected -->
            <ng-container *ngIf="bannerPreviewUrl; else bannerPlaceholder">
              <img
                *ngIf="isBannerImage; else bannerPdfBlock"
                [src]="bannerPreviewUrl"
                alt="Banner Preview"
              />
              <ng-template #bannerPdfBlock>
                <div class="pdf-preview">
                  <i class="fas fa-file-pdf"></i> {{ selectedBannerFile?.name }}
                </div>
              </ng-template>
            </ng-container>

            <!-- Placeholder when nothing is selected -->
            <ng-template #bannerPlaceholder>
              <div class="upload-icon">
                <i class="fas fa-cloud-upload-alt"></i>
              </div>
              <p>Drag & drop or click to upload</p>
              <p class="formats-note">Supported Formats: Pdf, Png, Jpg</p>
            </ng-template>
          </div>

          <!-- Hidden file input -->
          <input
            type="file"
            #bannerInput
            style="display: none"
            accept=".pdf,.png,.jpg,.jpeg"
            (change)="onBannerSelected($event)"
          />
        </div>

        <!-- Basic Information Section -->
        <!-- <h4 class="section-title">Basic Information</h4> -->
        <div class="row mb-4">
          <div class="col-md-4 mb-3">
            <label class="form-label">User Name</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter User Name"
              [(ngModel)]="userName"
              name="userName"
            />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">User Cnic</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter User Name"
              [(ngModel)]="cnic"
              name="userName"
            />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Profession</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter profession"
              [(ngModel)]="profession"
              name="profession"
            />
          </div>
        </div>

        <!-- Location Information -->
        <!-- <h4 class="section-title">Location Information</h4> -->
        <div class="row mb-4">
          <div class="col-md-4 mb-3">
            <label class="form-label">Study Level </label>
            <select class="form-select" (change)="onStudyChange($event)">
              <option selected disabled>Select Study Level</option>
              <option
                *ngFor="let item of DegreeLevel"
                [value]="item.studyLevelID"
              >
                {{ item.studyLevelTitle }}
              </option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Experience</label>
            <select class="form-select" (change)="onExperienceChange($event)">
              <option selected disabled>Select Experience</option>
              <option
                *ngFor="let item of experience"
                [value]="item.experienceID"
              >
                {{ item.experienceRange }}
              </option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Country</label>
            <select class="form-select" (change)="onCountryChange($event)">
              <option selected disabled>Select Country</option>
              <option
                *ngFor="let country of countries"
                [value]="country.countryID"
              >
                {{ country.countryName }}
              </option>
            </select>
          </div>
        </div>

        <!-- Contact Information -->
        <!-- <h4 class="section-title">Contact Information</h4> -->
        <div class="contact-info mb-4">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">City</label>
              <select class="form-select" (change)="onCityChange($event)">
                <option selected disabled>Select City</option>
                <option
                  *ngFor="let city of filteredCities"
                  [value]="city.cityID"
                >
                  {{ city.cityName }}
                </option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Contact No</label>
              <input
                type="text"
                class="form-control"
                placeholder="Phone number"
                [(ngModel)]="contactNo"
                name="contactNo"
              />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Address</label>
              <input
                type="text"
                class="form-control"
                placeholder="Address"
                [(ngModel)]="address"
                name="address"
              />
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Gender</label>
              <select
                class="form-select"
                [(ngModel)]="selectedGender"
                name="gender"
              >
                <option [ngValue]="null" disabled>Select Gender</option>
                <option *ngFor="let g of genders" [value]="g.genderID">
                  {{ g.genderName }}
                </option>
              </select>
            </div>

            <div class="col-md-4 mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="Email address"
                [(ngModel)]="companyEmail"
                name="companyEmail"
              />
            </div>
            <!-- Account Security -->
            <!-- <h4 class="section-title">Account Security</h4> -->

            <div class="col-md-4 mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter Password"
              />
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Confirm Password</label>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Enter Confrim Password"
            />
          </div>
        </div>

        <!-- Form Actions -->
        <div class="d-flex justify-content-end gap-2 mt-0">
          <button type="button" class="btn btn-cancel">Cancel</button>
          <button type="button" class="btn btn-register" (click)="onRegister()">
            Register
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
