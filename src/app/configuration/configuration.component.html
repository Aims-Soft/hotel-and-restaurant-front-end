<div class="container-fluid p-4  min-vh-100">


     <div *ngIf="successMessage" class="alert alert-success py-2 px-3 mt-2 mb-0">
          {{ successMessage }}
        </div>

        <!-- Error message -->
        <div *ngIf="errorMessage" class="alert alert-danger py-2 px-3 mt-2 mb-0">
          {{ errorMessage }}
        </div>
  
  <!-- Page Header -->
  <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
    <h3 class="fw-bold mb-0">Configurations</h3>
    
    <div class="d-flex gap-2 align-items-center">
      <!-- Search -->
     <div class="d-flex align-items-center dashboard-searchBox px-2 rounded">
          <i class="bi bi-search fs-5"></i>
          <input
            type="search"
            class="border-0 ms-2 dashboard-input bg-transparent ps-2 py-2"
            placeholder="Search here..."
            [(ngModel)]="searchTerm"
          />
          <img
            src="../../assets/images/Search Key.png"
            class="ms-5 img-fluid"
            alt=""
          />
        </div>
      
   
    </div>
  </div>
  
  <!-- Industry Type Section -->
  <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
    <div class="row g-3 align-items-end">
      <!-- Industry Type Dropdown -->
      <div class="col-md-5">
        <label class="form-label fw-semibold">Industry Type</label>
        <div class="d-flex gap-2">
          <ng-select
            class="flex-grow-1"
            name="industry"
            [items]="UniTypes"
            bindLabel="companyTypeTitle"
            bindValue="companyTypeID"
            placeholder="Select Industry Type"
            [(ngModel)]="selectedIndustry"
            (change)="onIndustryChangeNgSelect()"
            [searchable]="true"
            [clearable]="true"
          >
          </ng-select>
          
          <!-- Add Industry Button -->
          <button class="btn btn-outline-secondary rounded-3" 
                  data-bs-toggle="modal" 
                  data-bs-target="#addIndustryModal"
                  style="width: 45px; height: 45px;">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
      </div>
      
      <!-- Add Domain Section -->
      <div class="col-md-7">
        <label class="form-label fw-semibold">Add domain</label>
        <div class="d-flex gap-2">
          <input type="text" 
                 class="form-control form-control-lg bg-transparent" 
                 placeholder="Enter domain name"
                 [(ngModel)]="domainTitle"
                 [disabled]="!selectedIndustry">
          
          <button class="btn px-4 rounded-3" 
                  style="background-color: #B98D46; color: #1a1a1a; white-space: nowrap;"
                  (click)="addOrUpdateDomain()"
                  [disabled]="!selectedIndustry || !domainTitle">
            {{ editMode ? 'Update Domain' : 'Add Domain' }}
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Domains Grid -->
  <div class="row g-3">
    <div class="col-12 col-md-6 col-lg-4" 
         *ngFor="let domain of filteredDomains | search : searchTerm : 'domainTitle'">
      <div class="card border-0 shadow-sm rounded-3 p-3">
        <div class="d-flex justify-content-between align-items-center">
          <h6 class="mb-0 fw-semibold">{{ domain.domainTitle }}</h6>
          <div class="d-flex gap-2">
            <!-- Edit Button -->
            <button class="btn btn-sm btn-link text-primary p-0" 
                    (click)="editDomain(domain)">
              <i class="bi bi-pencil"></i>
            </button>
            
            <!-- Delete Button -->
            <button class="btn btn-sm btn-link text-danger p-0" 
                    (click)="deleteDomain(domain)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Empty State -->
    <div class="col-12 text-center py-5" *ngIf="filteredDomains.length === 0">
      <i class="bi bi-inbox" style="font-size: 3rem; color: #cbd5e1;"></i>
      <p class="text-muted mt-3">No domains found. Select an industry and add domains.</p>
    </div>
  </div>
  
</div>

<!-- Add Industry Modal -->
<div class="modal fade" id="addIndustryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-md">
    <div class="modal-content rounded-4 border-0">
      
      <!-- Modal Header -->
      <div class="modal-header border-0 px-4 py-3">
        <h6 class="modal-title fw-bold">Industry type</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      
      <!-- Modal Body -->
      <div class="modal-body p-4">
        <label class="form-label fw-semibold">Industry name</label>
        <input type="text" 
               class="form-control form-control-lg" 
               placeholder="Enter industry name"
               [(ngModel)]="newIndustryName">
      </div>
      
      <!-- Modal Footer -->
      <div class="modal-footer border-0 px-4 pb-4 pt-0">
        <button type="button" 
                class="btn btn-light rounded-pill px-4" 
                data-bs-dismiss="modal">
          Cancel
        </button>
        <button type="button" 
                class="btn rounded-pill px-4" 
                style="background-color: #B98D46; color: #1a1a1a;"
                (click)="addIndustry()"
                [disabled]="!newIndustryName">
          Add
        </button>
      </div>
      
    </div>
  </div>
</div>
