<div class="container mb-3 mt-5 px-5">
  <div class="box-border rounded">
    <div
      class="d-flex align-items-center justify-content-between px-2 py-2 bottom-border"
    >
      <p class="mt-2 custom-font text-black">Candidates</p>

      <div class="d-flex align-items-center gap-3">
        <!-- Success message -->
        <div *ngIf="successMessage" class="alert alert-success py-2 px-3 mt-2 mb-0">
          {{ successMessage }}
        </div>

        <!-- Error message -->
        <div *ngIf="errorMessage" class="alert alert-danger py-2 px-3 mt-2 mb-0">
          {{ errorMessage }}
        </div>

        <!-- Export to Excel Button -->
        <button
          class="btn btn-success d-flex align-items-center gap-2"
          (click)="exportToExcel()"
          [disabled]="isLoading || jobApplications.length === 0"
        >
          <i class="bi bi-file-earmark-excel"></i>
          Export to Excel
        </button>

        <!-- Search box -->
        <div class="d-flex align-items-center dashboard-searchBox px-2 rounded">
          <i class="bi bi-search fs-5"></i>
          <input
            type="search"
            class="border-0 ms-2 dashboard-input bg-transparent ps-2 py-2"
            placeholder="Search here..."
            [(ngModel)]="searchText"
          />
          <img
            src="../../assets/images/Search Key.png"
            class="ms-5 img-fluid"
            alt=""
          />
        </div>
      </div>
    </div>

    <!-- Candidates Table -->
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead class="border-bottom">
          <tr>
             <th class="head-row text-start" style="width: 10%;">Sr.no</th>
            <th class="head-row text-start" style="width: 30%;">Name</th>
            <th class="head-row text-center" style="width: 15%;">Country</th>
            <th class="head-row text-center" style="width: 15%;">City</th>
            <th class="head-row text-start " style="width: 20%;">Contact</th>
            <th class="head-row text-center" style="width: 20%;">Details</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let item of jobApplications | search : searchText : 'userName' let i = index"
            class="stripped-background"
          >
            <!-- Candidate Name + Email -->
             <td class="text-start ps-3 ">{{ i + 1 }}</td>
            <td class="text-start">
              <h5 class="fw-bold custom-font mb-0">{{ item.userName }}</h5>
              <small class="negative-margin">{{ item.email }}</small>
            </td>

            <!-- Country -->
            <td class="text-center">{{ item.countryName }}</td>

            <!-- City -->
            <td class="text-center">{{ item.cityName }}</td>

            <!-- Contact -->
            <td class="">
              {{ item.contact }}
            </td>

            <!-- Details Button -->
            <td class="text-center">
              <button
                class="px-2 py-2 application-custom-btn text-white border-0 rounded"
                (click)="onViewApplications(item)"
              >
                Details
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- No data message -->
      <div *ngIf="jobApplications.length === 0 && !isLoading" class="text-center py-5">
        <p class="text-muted">No candidates found</p>
      </div>

      <!-- Loading spinner -->
      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
  </div>
</div>
