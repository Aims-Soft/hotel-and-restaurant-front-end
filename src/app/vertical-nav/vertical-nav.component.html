<div class="row">
  <div class="col-md-2 d-flex ms-2 justify-content-center right-border  sidebar">
    <div class="d-flex flex-column justify-content-center align-items-start">
      <img
        src="../../assets/images/Career.logo.svg"
        class="img-fluid mt-5"
        width="181px"
        alt=""
      />

      <!-- Dynamic Menu Items -->
      <div class="mt-2 w-100" *ngFor="let item of menuList">
        <a
          class="d-flex align-items-center text-decoration-none px-3 py-2"
          routerLink="/{{ item.routeTitle }}"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <i class="bi bi-house icon-size text-black"></i>
          <span class="ms-3 text-black">{{ item.menuTitle }}</span>
        </a>
      </div>

      <!-- Static Menu Items -->
      <div class="top-margin mb-3 w-100">
        <a
          class="d-flex align-items-center text-decoration-none px-3 py-2 rounded"
          routerLink="/privacy"
          routerLinkActive="active-link"
        >
          <i class="bi bi-book-half icon-size text-black"></i>
          <span class="ms-3 text-black">Privacy Policy</span>
        </a>
        <a
          class="d-flex align-items-center text-decoration-none bg-danger px-3 py-2 rounded mt-2"
          routerLink="/signIn"
          (click)="logout()"
        >
          <i class="bi bi-box-arrow-right icon-size text-white"></i>
          <span class="ms-3 text-white">Logout</span>
        </a>
      </div>
    </div>
  </div>
</div>
