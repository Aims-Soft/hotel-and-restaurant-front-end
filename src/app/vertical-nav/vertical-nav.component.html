<div class="container-fluid p-0" style="height: 100vh">
  <!-- Top Header Row - Fixed -->
  <div class="row g-0 bottom-border" style="height: 70px">
    <!-- Logo Section - Col 2 with Dropdown -->
    <div
      class="col-md-2 d-flex align-items-center justify-content-center border position-relative"
    >
      <div class="w-100 d-flex justify-content-center position-relative">
        <img
          src="../../assets/images/wesiteLogo.svg"
          class="img-fluid"
          width="181px"
          alt="Logo"
          style="cursor: pointer"
          (click)="toggleLogoDropdown()"
        />
        <div
          class="dropdown-menu show"
          *ngIf="showLogoDropdown"
          style="
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 200px;
          "
        >
          <a
            class="dropdown-item d-flex align-items-center"
            href="#"
            (click)="logout(); $event.preventDefault()"
          >
            <i class="bi bi-box-arrow-right me-2 text-danger"></i>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Top Header - Col 10 -->
    <div class="col-md-10 border-start">
      <div
        class="py-3 d-flex align-items-center justify-content-end px-4 h-100"
      >
        <!-- Role Title -->
        <div class="me-3">
          <span class="fw-semibold text-dark">{{ loginName }}</span>
        </div>

        <!-- Notification Bell and Profile -->
        <div class="d-flex align-items-center">
          <i class="bi bi-bell fs-4"></i>
          <div class="d-flex align-items-center profile-border px-2 py-1 ms-2">
            <img
              src="../../assets/images/profilePic.png"
              class="img-fluid"
              alt="Profile"
            />
            <i class="bi bi-chevron-down ms-2 fs-5"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content with Sidebar -->
  <div class="row g-0" style="height: calc(100vh - 70px)">
    <!-- Sidebar - Col 2 - Fixed Position -->
    <div
      class="col-md-2 right-border position-fixed bg-white"
      style="height: calc(100vh - 70px); top: 70px; left: 0; z-index: 1000"
    >
      <div class="d-flex flex-column h-100 px-3 py-4">
        <!-- Logo/Brand Section -->
        <!-- <div class="mb-4">
          <div class="d-flex align-items-center">
            <img
              src="../../assets/images/logo-icon.png"
              alt="Logo"
              style="width: 40px; height: 40px"
            />
            <span class="ms-2 fw-bold">Pakistan Job Portal</span>
          </div>
        </div> -->

        <!-- Dynamic Menu Items (scrollable if needed) -->
        <div class="flex-grow-1" style="overflow-y: auto; overflow-x: hidden">
          <div class="mb-2" *ngFor="let item of menuList">
            <a
              class="d-flex align-items-center text-decoration-none px-3 py-2 rounded menu-item"
              routerLink="/{{ item.routeTitle }}"
              routerLinkActive="active-link"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <i [class]="item.menuIcon + ' fs-6'"></i>
              <span class="ms-3">{{ item.menuTitle }}</span>
              <span
                *ngIf="isMessagesMenu(item.menuTitle) && unreadMessageCount > 0"
                class="badge bg-danger rounded-pill ms-2"
                style="font-size: 0.7rem; min-width: 20px"
              >
                {{ unreadMessageCount }}
              </span>
            </a>
          </div>
        </div>

        <!-- Static Menu Items (Bottom) - Always visible -->
        <div class="mt-3 border-top pt-3">
          <a
            class="d-flex align-items-center text-decoration-none px-3 py-2 rounded menu-item mb-2"
            routerLink="/privacy"
            routerLinkActive="active-link"
          >
            <i class="bi bi-book-half fs-5"></i>
            <span class="ms-3">Privacy Policy</span>
          </a>
          <a
            class="d-flex align-items-center text-decoration-none bg-danger text-white px-3 py-2 rounded"
            routerLink="/signIn"
            (click)="logout()"
            style="cursor: pointer"
          >
            <i class="bi bi-box-arrow-right fs-5"></i>
            <span class="ms-3">Logout</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Main Content Area - Col 10 with offset -->
    <div
      class="col-md-10 offset-md-2"
      style="height: calc(100vh - 70px); overflow-y: auto; padding: 20px"
    >
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
