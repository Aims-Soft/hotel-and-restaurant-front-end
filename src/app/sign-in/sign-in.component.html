<div class="row" style="font-family: Poppins; ">
  <!-- Left Image Section -->
  <div class="col-md-6 d-none d-md-block">
    <img src="../../assets/images/signin.svg" class="img-fluid w-100 h-100" alt="sign-in" />
  </div>

  <!-- Right Login Section -->
  <div class="col-md-6 d-flex flex-column justify-content-center align-items-center p-5">
    
    <!-- Logo and Heading -->
    <img src="../../assets/images/Career.logo.svg" class="img-fluid mb-3" width="180" alt="logo" />
    <h2 class="fw-bold mb-2">Sign In</h2>
    <p class="text-muted mb-4">Enter your credential to access your account.</p>

    <!-- Toggle Buttons -->
    <!-- <div class="btn-group mb-4">
      <button type="button" class="btn bg-white px-4">Admin Login</button>
      <button type="button" class="btn text-white px-4 selected-btn">Company Login</button>
    </div> -->

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="w-75">


        <div *ngIf="showError" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="showError=false"></button>
  </div>

  <!-- Show Success Message -->
  <div *ngIf="showSuccess" class="alert alert-success alert-dismissible fade show" role="alert">
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="showSuccess=false"></button>
  </div>
      


      <!-- Email Field -->
      <div class="mb-3">
        <div class="input-group">
          <input type="email" formControlName="email" class="form-control input-style" placeholder="Name@gmail.com"
                 [ngClass]="{ 'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched }">
          <span class="input-group-text input-icon">
            <i class="bi bi-envelope"></i>
          </span>
        </div>
        <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger">
          Enter a valid email
        </small>
      </div>

      <!-- Password Field -->
      <div class="mb-3">
        <div class="input-group">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
                 class="form-control input-style" placeholder="Password"
                 [ngClass]="{ 'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched }">
          <span class="input-group-text input-icon cursor-pointer" (click)="togglePasswordVisibility()">
            <i [class]="showPassword ? 'bi bi-eye' : 'bi bi-eye-slash'"></i>
          </span>
        </div>
        <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger">
          Enter your password
        </small>
      </div>

      <!-- Forgot Password -->
      <!-- <div class="text-end mb-3">
        <a [routerLink]="'/auth/forgotPassword'" class="forgot-password-link">Forgot Password?</a>
      </div> -->

      <!-- Login Button -->
      <button type="submit" class="btn w-100 rounded-5 mb-3 login-btn text-center justify-content-center"[disabled]="isLoading">
        <span *ngIf="!isLoading" >Login</span>
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
      </button>

      <!-- OR Separator -->
      <!-- <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1 separator-line">
        <span class="mx-2 text-secondary">OR</span>
        <hr class="flex-grow-1 separator-line">
      </div> -->

      <!-- <div class="text-center mt-3">
        Don't have an account?
      </div> -->
    </form>

    <p class="text-center text-secondary mt-4" style="font-size: 12px;">
      Career 2025, All rights reserved
    </p>
  </div>
</div>
