<div class="row" style="font-family: poppins">
  <div class="col-md-6">
    <img
      src="../../assets/images/signin.svg"
      class="img-fluid responsive-img"
      alt="sign-in image"
    />
  </div>
  <div class="col-md-6 pt-4">
    <div class="text-center">
      <img
        src="../../assets/images/Career.logo.svg"
        class="img-fluid mt-5 pt-5 text-center"
        width="195em"
        alt="logo"
      />
      <h2 class="mt-4 fw-bold signIn-header">Sign In</h2>
      <p class="login-form-para">Enter your credential to access your account</p>
    </div>  

    <div class="mt-4 p-1 d-inline-block rounded select-login-div" >
    <div class=" d-flex justify-content-center ">
      <button class="btn bg-white px-4">Admin Login</button>
      <button class="btn text-white px-4 selected-btn" >Company Login</button>
    </div>
</div>

    <form action="">
      <div class="mt-4">
        <label for="email" style="margin-left: 7.2em">Email Address</label
        ><br />
        <input
          type="email"
          id="email"
          class="px-2 py-2 rounded mt-1 login-input-style"
        
          placeholder="Name@gmail.com"
        />
      </div>
      <div class="mt-3">
        <label for="password" style="margin-left: 7.2em">Password</label><br />
        <input
          type="password"
          id="password"
          class="px-2 rounded mt-1 login-input-style"
          placeholder="Password"
        />
      </div>
      <button
        class="btn text-center mt-4 text-white login-btn"
        routerLink="/companyDashboard"
      >
        Login
      </button>
    </form>
    <p class="text-center text-secondary mt-4" style="font-size: 12px">
      Career 2025, All rights reserved
    </p>
  </div>
</div>
